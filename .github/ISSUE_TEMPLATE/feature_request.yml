name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature would you like to see?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Describe the problem this feature would solve
    validations:
      required: true

  - type: dropdown
    id: package
    attributes:
      label: Related Package
      options:
        - "@webmcpregistry/core"
        - "@webmcpregistry/react"
        - "@webmcpregistry/nextjs"
        - "@webmcpregistry/vue"
        - "@webmcpregistry/angular"
        - "@webmcpregistry/svelte"
        - "@webmcpregistry/browser"
        - "@webmcpregistry/cli"
        - "@webmcpregistry/testing"
        - "@webmcpregistry/conformance"
        - "@webmcpregistry/evals"
        - "New package"
        - "Not sure"

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative approaches you've considered?
