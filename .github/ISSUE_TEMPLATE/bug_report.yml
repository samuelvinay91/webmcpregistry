name: Bug Report
description: Report a bug in the WebMCP Registry SDK
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thank you for reporting a bug! Please fill out the details below.

  - type: dropdown
    id: package
    attributes:
      label: Affected Package
      options:
        - "@webmcpregistry/core"
        - "@webmcpregistry/react"
        - "@webmcpregistry/nextjs"
        - "@webmcpregistry/vue"
        - "@webmcpregistry/angular"
        - "@webmcpregistry/svelte"
        - "@webmcpregistry/browser"
        - "@webmcpregistry/cli"
        - "@webmcpregistry/testing"
        - "@webmcpregistry/conformance"
        - "@webmcpregistry/evals"
        - "@webmcpregistry/mcp-server"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package Version
      placeholder: "0.1.0"

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - "Chrome (stable)"
        - "Chrome Canary (with WebMCP flag)"
        - "Edge"
        - "Firefox"
        - "Safari"
        - "Node.js (CLI/SSR)"
        - "N/A"
